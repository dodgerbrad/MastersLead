<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- iOS Specific Tags for 2026 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./masters.png">

    <title>2026 Masters</title>
    <link rel="stylesheet" href="master.css">
    <link rel="icon" type="image/png" href="./masters.png">

    
</head>

<body>
    <h1 onclick="window.location.reload();" style="cursor: pointer;">Masters Leaderboard</h1>


    <div id="status-message">Connecting to Google Sheets...</div>

    <div id="team-container">
        <h2>Team Standings</h2>
        <table>
            <thead>
                <tr>
                    <th>Team Name</th>
                    <th>Total Points</th>
                    <th>Pts Back</th>
                    <th>Rank</th>
                </tr>
            </thead>
            <tbody id="team-body"></tbody>
        </table>
    </div>

    <div id="leaderboard-container">
        <h2>Tournament Standings</h2>

        <input type="text" id="leaderboard-search" onkeyup="filterLeaderboard()" placeholder="Search by team...">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>Total</th>
                        <th>Today</th>
                        <th>Pts</th>
                        <th>Team</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- JS inserts <tr> here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="masters.js"></script>
</body>

</html>
